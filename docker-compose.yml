services:
  web:
    build:
      context: .
      args:
        NODE_VERSION: 24-alpine
    image: pluggo:latest
    container_name: pluggo
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
    # Uncomment when you wire the chatbot to a real LLM
    # env_file:
    #   - .env.local
